<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="100%" height="100%">
  <defs>
    <linearGradient id="govGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002D72" />
      <stop offset="100%" stop-color="#005A9C" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD100" />
      <stop offset="100%" stop-color="#FFA100" />
    </linearGradient>
  </defs>

  <!-- Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Book/Education shape -->
    <path d="M12,20 L30,10 L48,20 L30,30 Z" fill="url(#govGrad)" />
    <path d="M12,22 L12,38 L30,48 L30,32 Z" fill="#005A9C" opacity="0.9" />
    <path d="M48,22 L48,38 L30,48 L30,32 Z" fill="#002D72" />
    
    <!-- Dynamic Ribbon/Esportes shape -->
    <path d="M8,44 Q20,38 32,48 T52,42" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" />
    <!-- Dynamic Spark/Star -->
    <polygon points="30,5 33,12 40,12 35,16 37,23 30,19 23,23 25,16 20,12 27,12" fill="#FFD100" transform="scale(0.45) translate(46, 5)" />
  </g>

  <!-- Typography -->
  <g transform="translate(75, 28)">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="11" fill="#666666" letter-spacing="1.5">SECRETARIA DE</text>
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#002D72" y="18" letter-spacing="-0.5">Educação</text>
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#005A9C" y="34">e Esportes</text>
  </g>
</svg>
