<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="100%" height="100%">
  <defs>
    <linearGradient id="pharmacyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(10, 10)">
    <!-- Digital Circle -->
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#pharmacyGrad)" stroke-width="2.5" stroke-dasharray="160" stroke-dashoffset="30" />
    <!-- Pulse ring -->
    <circle cx="30" cy="30" r="24" fill="#E6F7FF" opacity="0.5" />
    
    <!-- Pharmacy Cross -->
    <path d="M25,18 h10 v8 h8 v10 h-8 v-8 h-10 v-8 h-8 v-10 h8 z" fill="url(#crossGrad)" rx="2" />
    
    <!-- Digital Dots/Nodes -->
    <circle cx="30" cy="8" r="3" fill="#0072FF" />
    <circle cx="48" cy="42" r="3" fill="#00F2FE" />
    <line x1="30" y1="8" x2="30" y2="18" stroke="#0072FF" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>

  <!-- Typography -->
  <g transform="translate(80, 42)">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="20" fill="#002D72" letter-spacing="-0.5">Farmácia</text>
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="16" fill="#009AD9" x="0" y="20" letter-spacing="1">DIGITAL</text>
  </g>
</svg>
